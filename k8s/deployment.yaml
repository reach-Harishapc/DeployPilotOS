apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploypilot-web
  labels:
    app: deploypilot-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: deploypilot-web
  template:
    metadata:
      labels:
        app: deploypilot-web
    spec:
      containers:
      - name: deploypilot-web
        image: deploypilot/web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
